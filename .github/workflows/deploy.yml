name: deploy-pages

# push 到主分支时把游戏发布到 GitHub Pages；也可在 Actions 页手动触发
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# GitHub Pages 官方部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，但不取消进行中的（避免发布到一半被打断）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建：先跑校验与测试作为发布闸门，再把单文件游戏打包成站点
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # 测试不过就不发布
      - name: Validate inline HTML script
        run: npm run check:html
      - name: Run tests
        run: npm test

      # GitHub Pages 在根路径默认找 index.html，
      # 因此把单文件游戏复制成 _site/index.html（不污染仓库）。
      - name: Prepare site
        run: |
          mkdir -p _site
          cp epidemic-commander.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # 部署：把构建产物发布到 Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
